services:
  - type: web
    name: petcare-app
    env: php
    buildCommand: "bash render-build.sh"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: db.yctxqfskyyohkwjyylkf.supabase.co
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: postgres
      - key: DB_USERNAME
        value: postgres.yctxqfskyyohkwjyylkf
      # Note: APP_KEY and DB_PASSWORD must be entered manually in the Render Dashboard for security.
